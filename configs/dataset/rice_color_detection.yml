task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 1 # your dataset classes
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /tangquan/DatasetT/RiceHybrids/color_difference_2048_coco/images/train
    ann_file: /tangquan/DatasetT/RiceHybrids/color_difference_2048_coco/annotations/annotations_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
#  num_workers: 14
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /tangquan/DatasetT/RiceHybrids/color_difference_2048_coco/images/val
    ann_file: /tangquan/DatasetT/RiceHybrids/color_difference_2048_coco/annotations/annotations_val.json
#测试集
#    img_folder: /tangquan/DatasetT/RiceHybrids/color_difference_2048_coco/images/test
#    ann_file: /tangquan/DatasetT/RiceHybrids/color_difference_2048_coco/annotations/annotations_test.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
#  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
