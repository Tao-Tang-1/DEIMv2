task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 2 # your dataset classes
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /tangquan/DatasetT/WheatMixedPlants/small_200/images/train
    ann_file: /tangquan/DatasetT/WheatMixedPlants/small_200/annotations/annotations_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
#  num_workers: 14
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /tangquan/DatasetT/WheatMixedPlants/small_200/images/val
    ann_file: /tangquan/DatasetT/WheatMixedPlants/small_200/annotations/annotations_val.json
#测试集
#    img_folder: /tangquan/DatasetT/WheatzazhuCoCo/images/test
#    ann_file: /tangquan/DatasetT/WheatzazhuCoCo/annotations/instances_test.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
#  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
