# -------------------------
# Runtime / global
# -------------------------
print_freq: 500
output_dir: ./outputs/wheat_train/deimv2_dinov3_s_wheat_image640

sync_bn: True
find_unused_parameters: True

use_amp: True
scaler:
  type: GradScaler
  enabled: True

use_ema: True
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000
  start: 0

epoches: 78
clip_max_norm: 0.1

# -------------------------
# Dataset / evaluator
# -------------------------
task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox']

num_classes: 1
remap_mscoco_category: False

# -------------------------
# Train / Val dataloaders (CocoDetection)
# -------------------------
train_dataloader:
  type: DataLoader
  shuffle: True
  total_batch_size: 32
  num_workers: 4
  drop_last: True

  dataset:
    type: CocoDetection
    img_folder: /tangquan/DatasetT/WheatzazhuCoCo/tiles/images_640/train
    ann_file: /tangquan/DatasetT/WheatzazhuCoCo/tiles/annotations_640/annotations_train.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1,0.1], scaling_range: [0.5,1.5],
           probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485,0.456,0.406], std: [0.229,0.224,0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: [4, 37, 66]
        ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
      mosaic_prob: 0.5

  collate_fn:
    type: BatchImageCollateFunction
    # Mixup options
    mixup_prob: 0.5
    mixup_epochs: [4, 37]
    stop_epoch: 66    # epoch in [72, ~) stop `multiscales`
    # CopyBlend options
    copyblend_prob: 0.5
    copyblend_epochs: [4, 66]
    area_threshold: 100
    num_objects: 3
    with_expand: True
    expand_ratios: [0.1, 0.25]

    ema_restart_decay: 0.9999
    base_size_repeat: 3

val_dataloader:
  type: DataLoader
  shuffle: False
  total_batch_size: 32
  num_workers: 2
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction

  dataset:
    type: CocoDetection
    img_folder: /tangquan/DatasetT/WheatzazhuCoCo/images_v1/images/test
    ann_file: /tangquan/DatasetT/WheatzazhuCoCo/images_v1/annotations/annotations_test
#    img_folder: /tangquan/DatasetT/WheatzazhuCoCo/tiles/images_640/val
#    ann_file: /tangquan/DatasetT/WheatzazhuCoCo/tiles/annotations_640/annotations_val.json
#测试集
#    img_folder: /tangquan/DatasetT/WheatzazhuCoCo/tiles/images_640/test
#    ann_file: /tangquan/DatasetT/WheatzazhuCoCo/tiles/annotations_640/annotations_test.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485,0.456,0.406], std: [0.229,0.224,0.225]}

# -------------------------
# Model / DEIMv2 (use DINOv3STAs backbone)
# -------------------------
model: DEIM
criterion: DEIMCriterion
postprocessor: PostProcessor

use_focal_loss: True
eval_spatial_size: [640, 640]
checkpoint_freq: 5

DEIM:
  backbone: DINOv3STAs
  encoder: HybridEncoder
  decoder: DEIMTransformer

DINOv3STAs:
  name: vit_tiny
  embed_dim: 192
  weights_path: ./ckpts/vitt_distill.pt
  interaction_indexes: [5, 8, 11]
  num_heads: 3
  finetune: True
  conv_inplane: 64
  hidden_dim: 192

HybridEncoder:
  in_channels: [192, 192, 192]
  feat_strides: [8, 16, 32]

  hidden_dim: 192
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 512
  dropout: 0.
  enc_act: 'gelu'

  expansion: 0.34
  depth_mult: 0.67
  act: 'silu'

  version: deim
  csp_type: csp2
  fuse_op: sum

DEIMTransformer:
  feat_channels: [192, 192, 192]
  feat_strides: [8, 16, 32]
  hidden_dim: 192
  num_levels: 3

  num_layers: 6
  eval_idx: -1
  num_queries: 300

  num_denoising: 100
  label_noise_ratio: 0.5

  box_noise_scale: 1.0

  reg_max: 32
  reg_scale: 4
  layer_scale: 1

  num_points: [3, 6, 3]
  cross_attn_method: default
  query_select_method: one2many

  activation: silu
  mlp_act: silu
  dim_feedforward: 512

PostProcessor:
  num_top_queries: 300

# -------------------------
# Criterion / Loss
# -------------------------
DEIMCriterion:
  weight_dict: {loss_mal: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['mal', 'boxes', 'local']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 59

# -------------------------
# Optimizer (param groups + initial_lr)
# -------------------------
optimizer:
  type: AdamW
  params:
    -
      # except norm/bn/bias in self.dinov3
      params: '^(?=.*.dinov3)(?!.*(?:norm|bn|bias)).*$'
      lr: 0.000025
    -
      # including norm/bn/bias in self.dinov3
      params: '^(?=.*.dinov3)(?=.*(?:norm|bn|bias)).*$'
      lr: 0.000025
      weight_decay: 0.
    -
      # including norm/bn/bias except for the self.dinov3
      params: '^(?=.*(?:sta|encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.0001


# -------------------------
# LR Scheduler (FlatCosine)
# -------------------------
lr_scheduler:
  type: MultiStepLR
  milestones: [500]
  gamma: 0.1

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 500


#lrsheduler: flatcosine
#lr_gamma: 1
#warmup_iter: 500
#flat_epoch: 50
#no_aug_epoch: 0
lrsheduler: flatcosine
lr_gamma: 0.5
warmup_iter: 2000
flat_epoch: 37    # 4 + epoch // 2, e.g., 40 = 4 + 72 / 2
no_aug_epoch: 12

# -------------------------
# Misc
# -------------------------
# any extra project-specific settings can be added below
