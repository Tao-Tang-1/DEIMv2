__include__: [
  '../../dataset/custom_detection.yml',
  '../../runtime.yml',
  '../../base/dataloader.yml',
  '../../base/optimizer.yml',
  '../../base/deimv2.yml',
]


output_dir: ./outputs/wheat_train/deimv2_dinov3_x_wheat_train18
  
DEIM:
  backbone: DINOv3STAs

DINOv3STAs:
  name: dinov3_vits16plus
  weights_path: ./ckpts/dinov3_vits16plus_pretrain_lvd1689m-4057cbaa.pth
  interaction_indexes: [5,8,11]   # only need the [1/8, 1/16, 1/32]
  finetune: True
  conv_inplane: 64
  hidden_dim: 256

HybridEncoder:
  in_channels: [256, 256, 256]
  # intra
  hidden_dim: 256
  dim_feedforward: 1024

  # cross 
  expansion: 1.25
  depth_mult: 1.37

DEIMTransformer:
  num_layers: 6
  eval_idx: -1
  feat_channels: [256, 256, 256]
  # reg_scale: 8
  hidden_dim: 256
  dim_feedforward: 2048

optimizer:
  type: AdamW
  params: 
    -
      # except norm/bn/bias in self.dinov3
      params: '^(?=.*.dinov3)(?!.*(?:norm|bn|bias)).*$'  
      lr: 0.00001
    -
      # including norm/bn/bias in self.dinov3
      params: '^(?=.*.dinov3)(?=.*(?:norm|bn|bias)).*$'    
      lr: 0.00001
      weight_decay: 0.
    - 
      # including norm/bn/bias except for the self.dinov3
      params: '^(?=.*(?:sta|encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125


epoches: 78


train_dataloader:
  dataset:
    transforms:
      ops:
        - {type: RandomHorizontalFlip}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 29, 50]   # list

  collate_fn:
    mixup_epochs: [4, 29]
    stop_epoch: 50
    copyblend_epochs: [4, 50]
    base_size_repeat: 3

val_dataloader:
  dataset:
    transforms:
      ops:
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}